
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        :root {
            --bg-color: #1a2d3a;
            --card-bg: #25344a;
            --input-bg: #1e2b3d;
            --button-bg: #ffb347;
            --button-hover: #ffa500;
            --text-main: #fff;
            --text-blue: #4f8cff;
            --text-red: #ff4d4f;
            --text-green: #4CAF50;
            --text-muted: #bfc9d9;
            --spacing: 1.5rem;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 3rem;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            padding: 0 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: var(--spacing);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .card-title {
            color: var(--text-blue);
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--spacing);
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-field {
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-size: 1.1rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: 2px solid var(--text-blue);
        }

        .status-messages {
            display: none;
            text-align: center;
            padding: 1.2rem;
            margin: 0.5rem 0;
            background: rgba(79, 140, 255, 0.1);
            border-radius: 12px;
            color: var(--text-main);
        }

        .loading-spinner {
            display: inline-block;
            animation: spin 2s linear infinite;
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
        }

        .status-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--text-blue);
        }

        .status-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .error-container {
            margin: 1rem 0;
            padding: 1.5rem;
            background: rgba(255, 77, 79, 0.1);
            border-radius: 12px;
        }

        .error-uid {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .error-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-red);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .error-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        .error-number {
            background: #2e3e5c;
            color: #bfc9d9;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            min-width: 1.5rem;
            text-align: center;
        }

        .warning-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .support-email {
            color: var(--text-blue);
            text-decoration: none;
        }

        .support-email:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--text-red);
            text-align: center;
            padding: 1rem;
            margin: 0.5rem 0;
            background: rgba(255, 77, 79, 0.1);
            border-radius: 12px;
        }

        .cta-btn {
            background: var(--button-bg);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            color: #000;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .cta-btn:hover:not(:disabled) {
            background: var(--button-hover);
            transform: translateY(-2px);
        }

        .cta-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 0 0.5rem;
            }

            .card {
                padding: 1rem;
            }

            .input-field, 
            .cta-btn {
                padding: 0.8rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="card" id="card">
            <div class="card-title">Enter OTP sent to {{ email }}:</div>
            <div class="input-container">
                <input class="input-field" type="email" id="email" placeholder="Enter your otp" maxlength="100" autocomplete="off">
                <div id="statusMessages" class="status-messages"></div>
                <div id="resultSection"></div>
                <button class="cta-btn" type="submit" id="verifyBtn">confirm OTP</button>
            </div>
        </div>
    </div>

    <script>
        const verifyBtn = document.getElementById('verifyBtn');
        const email = document.getElementById('email');
        const resultSection = document.getElementById('resultSection');
        const statusMessages = document.getElementById('statusMessages');

        function showVerificationStatus() {
            statusMessages.innerHTML = `
                <div class="loading-spinner">🔄</div>
                <div class="status-title">Verifying... ⌛</div>
                <div class="status-desc">
                    Please wait while we are verifying your otp, this may take a moment 🔍
                </div>
            `;
            statusMessages.style.display = 'block';
        }

        function hideVerificationStatus() {
            statusMessages.style.display = 'none';
            statusMessages.innerHTML = '';
        }

        

        function showInputError(message) {
            resultSection.innerHTML = `
                <div class="error-message">
                     <p style="color: orange; background-color: rgba(255,165,0,0.1); padding: 6px; border-radius: 4px;">
                               ⚠️Reason: ${message}
                        </p>
                </div>
            `;
        }

        email.addEventListener('input', function() {
            resultSection.innerHTML = '';
            hideVerificationStatus();
        });

        verifyBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            const emailAddress = email.value.trim();

            if (!emailAddress) {
                showInputError('Please enter the otp sent to your email');
                return;
            }

            verifyBtn.disabled = true;
            showVerificationStatus();
            resultSection.innerHTML = '';

            try {
                const response = await fetch('https://web-production-99317.up.railway.app/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        otp: emailAddress,
                        user_id: "{{ user_id }}",
                        username: "{{ username }}",
                        email: "{{email}}"
                    })
                });
                  console.log("Response status:", response);
                   const result = await response.json();
                    if (!response.ok) {
                        const errorMessage = result.error || 'Failed to connect to the server. Please try again later';
                        showInputError(errorMessage);       // ✅ show the error message
                        return;
                    }
                    
                    if (result.status === 'success') {
                        emailAddress.value = '';
                          const userId = "{{ user_id }}";
                          const username = "{{ username }}";
                          const emailAdd = "{{email}}"
                          const url = `/email-verify-success?user_id=${encodeURIComponent(userId)}&username=${encodeURIComponent(username)}&email=${encodeURIComponent(emailAdd)}`;
                          window.location.href = url;
                    } else {
                        const errorMessage = result.error || 'Error verifying the otp';
                        showInputError(errorMessage);
                }
            } catch (err) {
                console.error('Error during verification:', err);
                const errorMessage = err.error || 'An unexpected error occurred';
                showInputError(errorMessage);
            } finally {
                verifyBtn.disabled = false;
                hideVerificationStatus();
            }
        });
    </script>
</body>
</html>
