<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Verification - CryptoGents</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-color: #1a2d3a;
            --card-bg: #25344a;
            --input-bg: #1e2b3d;
            --button-bg: #ffb347;
            --button-hover: #ffa500;
            --text-main: #fff;
            --text-blue: #4f8cff;
            --text-red: #ff4d4f;
            --text-green: #4CAF50;
            --text-muted: #bfc9d9;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .main-container {
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow: var(--shadow-md);
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .main-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-blue), #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .radio-label {
            position: relative;
            display: block;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .radio-content {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem;
            background: var(--input-bg);
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .radio-label:hover .radio-content {
            background: rgba(79, 140, 255, 0.1);
            transform: translateY(-2px);
        }

        .exchange-icon {
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(79, 140, 255, 0.1);
            border-radius: 12px;
            transition: var(--transition);
        }

        .exchange-info {
            flex: 1;
        }

        .exchange-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .exchange-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .radio-label input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-label input[type="radio"]:checked + .radio-content {
            background: rgba(79, 140, 255, 0.1);
        }

        .radio-label input[type="radio"]:checked + .radio-content .exchange-icon {
            background: rgba(79, 140, 255, 0.2);
        }

        .radio-label input[type="radio"]:checked + .radio-content .exchange-name {
            color: var(--text-blue);
        }

        .radio-label input[type="radio"]:checked ~ * {
            border-color: var(--text-blue);
        }

        #verificationSection {
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            margin-top: 2rem;
        }

        #verificationSection.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(191, 201, 217, 0.2);
        }

        .divider-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .card-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .input-field {
            width: 100%;
            padding: 1.25rem;
            background: var(--input-bg);
            border: 2px solid rgba(191, 201, 217, 0.2);
            border-radius: var(--border-radius);
            color: var(--text-main);
            font-size: 1.1rem;
            text-align: center;
            transition: var(--transition);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--text-blue);
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2);
        }

        .cta-btn {
            width: 100%;
            padding: 1.25rem;
            margin-top: 1.5rem;
            background: var(--button-bg);
            color: #000;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
        }

        .cta-btn:hover:not(:disabled) {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 179, 71, 0.3);
        }

        .cta-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .status-messages,
        .error-message {
            text-align: center;
            padding: 1.25rem;
            margin: 1rem 0;
            background: rgba(79, 140, 255, 0.1);
            border-radius: var(--border-radius);
        }

        .error-message {
            background: rgba(255, 77, 79, 0.1);
        }

        .error-container {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin: 1rem 0;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 165, 0, 0.2);
        }

        .error-uid {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(79, 140, 255, 0.1);
            border-radius: 8px;
            text-align: center;
        }

        .error-header {
            margin-bottom: 1.5rem;
            padding: 0.75rem;
            background: rgba(255, 165, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 165, 0, 0.2);
        }

        .error-header p {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffa500;
            font-weight: 500;
            margin: 0;
            font-size: 0.95rem;
        }

        .error-steps {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .error-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(79, 140, 255, 0.05);
            border-radius: 8px;
            transition: var(--transition);
        }

        .error-item:hover {
            background: rgba(79, 140, 255, 0.1);
        }

        .error-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--text-blue);
            color: var(--text-main);
            border-radius: 50%;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .error-content {
            flex: 1;
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .error-content strong {
            display: inline-block;
            margin-bottom: 0.25rem;
            color: var(--text-blue);
        }

        .warning-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(191, 201, 217, 0.2);
        }

        .warning-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 77, 79, 0.05);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .warning-icon {
            color: #ffa500;
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }

        .support-email {
            color: var(--text-blue);
            font-weight: 500;
            transition: var(--transition);
        }

        .support-email:hover {
            color: #00ffcc;
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .card {
                padding: 1.5rem;
            }

            .main-title {
                font-size: 1.75rem;
            }

            .radio-content {
                padding: 1rem;
            }

            .exchange-icon {
                width: 40px;
                height: 40px;
            }

            .input-field,
            .cta-btn {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="card">
            <div class="welcome-section">
                <h1 class="main-title">Exchange Verification</h1>
                <p class="subtitle">Select your exchange platform to proceed with verification</p>
            </div>
            <div class="input-container">
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="exchange" value="blofin">
                        <div class="radio-content">
                            <div class="exchange-icon">🔷</div>
                            <div class="exchange-info">
                                <span class="exchange-name">BloFin</span>
                                <span class="exchange-desc">No KYC required</span>
                            </div>
                        </div>
                    </label>
                   <label class="radio-label disabled">
                        <input 
                            type="radio" 
                            name="exchange" 
                            value="bydfi" 
                        >
                        <div class="radio-content">
                            <div class="exchange-icon">🟢</div>
                            <div class="exchange-info">
                            <span class="exchange-name">Bydfi</span>
                            <span class="exchange-desc">No KYC required</span>
                            </div>
                        </div>
                    </label>


                    <label class="radio-label disabled">
                        <input 
                            type="radio" 
                            name="exchange" 
                            value="weex" 
                        >
                        <div class="radio-content">
                            <div class="exchange-icon">♻️</div>
                            <div class="exchange-info">
                            <span class="exchange-name">WEEX</span>
                            <span class="exchange-desc">No KYC required</span>
                            </div>
                        </div>
                    </label>

                </div>
                
                <div id="verificationSection" style="display: none;">
                    <div class="section-divider">
                        <span class="divider-line"></span>
                        <span class="divider-text">Enter Your Details</span>
                        <span class="divider-line"></span>
                    </div>
                    
                    <div id="uidInputContainer">
                        <div class="card-subtitle" id="exchangeTitle"></div>
                        <input class="input-field" type="text" id="exchangeId" placeholder="" maxlength="32" autocomplete="off">
                        <button class="cta-btn" type="submit" id="verifyBtn">Verify Account</button>
                    </div>
                </div>
                
                <div id="statusMessages" class="status-messages"></div>
                <div id="resultSection"></div>
            </div>
        </div>
    </div>

    <script>
        const verifyBtn = document.getElementById('verifyBtn');
        const exchangeId = document.getElementById('exchangeId');
        const resultSection = document.getElementById('resultSection');
        const statusMessages = document.getElementById('statusMessages');
        const uidInputContainer = document.getElementById('uidInputContainer');
        const exchangeTitle = document.getElementById('exchangeTitle');
        const radioButtons = document.getElementsByName('exchange');
        const verificationSection = document.getElementById('verificationSection');

        function showVerificationStatus() {
            statusMessages.innerHTML = `
                <div class="loading-spinner">🔄</div>
                <div class="status-title">Verifying...</div>
                <div class="status-desc">
                    Please wait while we verify your account details
                </div>
            `;
            statusMessages.style.display = 'block';
        }

        function hideVerificationStatus() {
            statusMessages.style.display = 'none';
            statusMessages.innerHTML = '';
        }

        function showError(uid, msg, exchange) {
            const exchangeMap = {
                        blofin: "BloFin",
                        bydfi: "Bydfi",
                        weex: "WEEX",
                        };
            const referralLinks = {
                blofin: "https://partner.blofin.com/d/CryptoGents",
                bydfi: "https://partner.bydfi.com/register?vipCode=7EqnZj",
                weex: "https://www.weex.com/register?vipCode=cryptogents"
            };
            const LINK = referralLinks[exchange] || "#";

            const exchangeName = exchangeMap[exchange] || exchange;


            resultSection.innerHTML = `
                <div class="error-container">
                    <div class="error-uid">
                        ID: ${uid}
                    </div>
                    
                    <div class="error-header">
                        <p>⚠️ ${msg}</p>
                    </div>

                    <div class="error-steps">
                        <div class="error-item">
                            <span class="error-number">1</span>
                            <div class="error-content">
                                <strong>Register with CryptoGents</strong>
                                Sign up using our <a href="${LINK}" class="support-email" target="_blank">referral link</a> to access all features
                            </div>
                        </div>

                        <div class="error-item">
                            <span class="error-number">2</span>
                            <div class="error-content">
                                <strong>Check Your ${exchangeName} ID</strong>
                                Ensure you've entered the correct ID from your ${exchangeName} profile
                            </div>
                        </div>
                    </div>

                    <div class="warning-section">
                        <div class="warning-item">
                            <span class="warning-icon">💬</span>
                            <div>
                                <strong>Need Help?</strong>
                                Message us on <a href="https://t.me/CryptogentsSupport" class="support-email" target="_blank">Telegram</a> for instant support
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function showInputError(message) {
            resultSection.innerHTML = `
                <div class="error-message">
                    <p>⚠️ ${message}</p>
                    <p style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">
                        Need help? Message us on <a href="https://t.me/CryptogentsSupport" class="support-email" target="_blank">Telegram</a> for instant support
                    </p>
                </div>
            `;
        }

        radioButtons.forEach(radio => {
            radio.addEventListener('change', function() {
                const selectedExchange = this.value;
                exchangeId.value = '';
                resultSection.innerHTML = '';
                hideVerificationStatus();
                
                verificationSection.style.display = 'block';
                setTimeout(() => {
                    verificationSection.classList.add('visible');
                }, 50);

                const exchangeMap = {
                        blofin: "BloFin",
                        bydfi: "Bydfi",
                        weex: "WEEX"
                    };
                const exchangeName = exchangeMap[selectedExchange] || selectedExchange;
                exchangeTitle.textContent = `Please enter your ${exchangeName} User ID to proceed`;
                exchangeId.placeholder = `Your ${exchangeName} UUID`;
                verifyBtn.disabled = false;

                verificationSection.scrollIntoView({ behavior: 'smooth' });
            });
        });

        exchangeId.addEventListener('input', function() {
            resultSection.innerHTML = '';
            hideVerificationStatus();
        });

        verifyBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            const uid = exchangeId.value.trim();
            const selectedExchange = document.querySelector('input[name="exchange"]:checked').value;
            console.log("selectedExchange", selectedExchange)
            if (!uid) {
                showInputError('Please enter your User ID');
                return;
            }

            if (!/^\d+$/.test(uid)) {
                showInputError('Invalid User ID format. Please enter a valid numeric ID');
                return;
            }

            verifyBtn.disabled = true;
            showVerificationStatus();
            resultSection.innerHTML = '';

            try {
                const response = await fetch('https://web-production-99317.up.railway.app/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        blofin_id: uid,
                        exchange: selectedExchange,
                        user_id: "{{ user_id }}",
                        username: "{{ username }}"
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    const errorMessage = result.error || 'Failed to connect to the server. Please try again later';
                    showError(uid, errorMessage, selectedExchange);
                    return;
                }

                if (result.status === 'success') {
                    exchangeId.value = '';
                    const userId = "{{ user_id }}";
                    const username = "{{ username }}";
                    const url = `/blofin-verify-success?user_id=${encodeURIComponent(userId)}&username=${encodeURIComponent(username)}&blofin_id=${encodeURIComponent(uid)}`;
                    window.location.href = url;
                } else {
                    const errorMessage = result.error || 'Error verifying the User ID';
                    showError(uid, errorMessage, selectedExchange);
                }
            } catch (err) {
                console.error('Error during verification:', err);
                showError(uid, 'An unexpected error occurred. Please try again.', "");
            } finally {
                verifyBtn.disabled = false;
                hideVerificationStatus();
            }
        });
    </script>
</body>
</html>
